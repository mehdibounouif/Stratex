version: '3.8'

services:
  # 1. Main Trading Engine
  stratex:
    build: .
    container_name: stratex_engine
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./risk/reports:/app/risk/reports
    restart: unless-stopped
    command: ["./scripts/start.sh", "python", "main.py", "--live"]

  # 2. Streamlit Dashboard
  dashboard:
    build: .
    container_name: stratex_dashboard
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./risk/reports:/app/risk/reports
    restart: unless-stopped
    command: ["./scripts/start.sh", "streamlit", "run", "dashboard/app.py", "--server.port", "8501", "--server.address", "0.0.0.0"]

  # 3. REST API Server
  api:
    build: .
    container_name: stratex_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./risk/reports:/app/risk/reports
    restart: unless-stopped
    command: ["./scripts/start.sh", "python", "main.py", "--api"]
